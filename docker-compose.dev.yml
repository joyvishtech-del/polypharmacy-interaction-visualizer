# Development override: bind-mounts source for hot reload + exposes service ports.
# Usage: docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
version: "3.9"

services:
  postgres:
    ports:
      - "5432:5432"

  minio:
    ports:
      - "9000:9000"  # S3 API
      - "9001:9001"  # Console UI

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      ENVIRONMENT: development
      LOG_LEVEL: debug
    volumes:
      - ./backend:/app
      - /app/__pycache__
    ports:
      - "8000:8000"

  frontend:
    # Override the production nginx image with a node dev server.
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
