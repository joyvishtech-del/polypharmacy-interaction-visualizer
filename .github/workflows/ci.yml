name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ------------------------------------------------------------------
  # Backend: lint, type-check, tests (against a real Postgres service)
  # ------------------------------------------------------------------
  backend:
    name: Backend (lint + type-check + tests)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: polypharmacy
          POSTGRES_PASSWORD: devpassword
          POSTGRES_DB: polypharmacy_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U polypharmacy"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://polypharmacy:devpassword@localhost:5432/polypharmacy_test
      SECRET_KEY: ci-test-secret-key-not-for-production
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "30"
      REFRESH_TOKEN_EXPIRE_DAYS: "7"
      ANTHROPIC_API_KEY: test-key
      ANTHROPIC_MODEL: claude-opus-4-7
      TESSERACT_PATH: /usr/bin/tesseract
      S3_BUCKET: test-bucket
      S3_REGION: us-east-1
      S3_ACCESS_KEY_ID: minioadmin
      S3_SECRET_ACCESS_KEY: minioadmin
      S3_ENDPOINT_URL: http://localhost:9000
      FRONTEND_ORIGIN: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install system deps (Tesseract)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Ruff (lint)
        working-directory: backend
        run: ruff check .

      - name: Mypy (type check)
        working-directory: backend
        run: mypy app

      - name: Pytest (with coverage)
        working-directory: backend
        run: pytest --cov=app --cov-report=xml --cov-fail-under=80

  # ------------------------------------------------------------------
  # Frontend: lint, type-check, test, build
  # ------------------------------------------------------------------
  frontend:
    name: Frontend (lint + type-check + test + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint

      - name: Type check
        working-directory: frontend
        run: npm run type-check

      - name: Test
        working-directory: frontend
        run: npm test -- --run

      - name: Build
        working-directory: frontend
        run: npm run build

  # ------------------------------------------------------------------
  # Docker: only after both test jobs pass — verifies images build
  # ------------------------------------------------------------------
  docker:
    name: Docker build (backend + frontend)
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: false
          tags: polypharmacy-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          tags: polypharmacy-frontend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Validate docker-compose config
        run: |
          cp .env.example .env
          docker compose -f docker-compose.yml config
